name: Deployment to Production

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      # 🧩 Checkout source code
      - name: Checkout code
        uses: actions/checkout@v3

      # ⚙️ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # 📦 Install dependencies
      - name: Install dependencies
        run: npm ci

      # ✅ Linting
      - name: Lint code
        run: npm run lint

      # 🧪 Run unit tests
      - name: Run tests
        run: npm test -- --ci --reporters=default

      # 🏗️ Build NestJS project
      - name: Build NestJS
        run: npm run build

      # 🕒 Generate unique release timestamp
      - name: Generate release timestamp
        run: echo "RELEASE=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      # 📤 Copy built application files (including 'dist') to server
      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          # IMPORTANT FIX: Explicitly list all required files and folders,
          # including 'dist', to ensure the built code is copied.
          # We no longer use 'source: "."' which was respecting .gitignore.
          source: "dist,package.json,package-lock.json,ecosystem.config.js"
          target: "${{ secrets.APP_PATH }}/blog-backend/releases/${{ env.RELEASE }}"

      # 🚀 Deploy on EC2
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            whoami
            APP_PATH=${{ secrets.APP_PATH }}/blog-backend
            RELEASE=${{ env.RELEASE }}

            echo "Deploying release: $RELEASE"

            # Link server .env file
            ln -sf $APP_PATH/shared/.env $APP_PATH/releases/$RELEASE/.env

            # Install production dependencies
            cd $APP_PATH/releases/$RELEASE
            npm ci --omit=dev

            # Update symlink for zero-downtime deployment
            ln -sfn $APP_PATH/releases/$RELEASE $APP_PATH/current

            # Start or reload PM2 app
            pm2 startOrReload $APP_PATH/current/ecosystem.config.js --env production
            pm2 save

            # Keep only last 5 releases
            cd $APP_PATH/releases
            ls -1tr | head -n -5 | xargs -d '\n' rm -rf --
