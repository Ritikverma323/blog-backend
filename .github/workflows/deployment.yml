name: Deployment to Production

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      # 🧩 Checkout source code
      - name: Checkout code
        uses: actions/checkout@v3

      # ⚙️ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # 📦 Install dependencies
      - name: Install dependencies
        run: npm ci

      # ✅ Linting
      - name: Lint code
        run: npm run lint

      # 🧪 Run unit tests
      - name: Run tests
        run: npm test -- --ci --reporters=default

      # 🏗️ Build NestJS project
      - name: Build NestJS
        # The build step is confirmed to work and places output in 'dist/src'
        run: npm run build

      # 🕒 Generate unique release timestamp
      - name: Generate release timestamp
        run: echo "RELEASE=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      # 📤 Copy built application files (including 'dist') to server
      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          # Copies 'dist', 'package.json', 'package-lock.json', and 'ecosystem.config.js'
          source: "dist,package.json,package-lock.json,ecosystem.config.js"
          target: "${{ secrets.APP_PATH }}/blog-backend/releases/${{ env.RELEASE }}"

      # 🚀 Deploy on EC2
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            whoami
            APP_PATH=${{ secrets.APP_PATH }}/blog-backend
            RELEASE=${{ env.RELEASE }}

            echo "Deploying release: $RELEASE"

            # Link server .env file
            ln -sf $APP_PATH/shared/.env $APP_PATH/releases/$RELEASE/.env

            # Install production dependencies
            cd $APP_PATH/releases/$RELEASE
            npm ci --omit=dev
            
            # CRITICAL DEBUGGING STEP: Verify the file exists on the server before PM2 runs
            echo "Verifying application entry file exists on server:"
            ls -l $APP_PATH/releases/$RELEASE/dist/src/main.js || (echo "ERROR: main.js is missing from the release folder on EC2!" && exit 1)


            # Update symlink for zero-downtime deployment
            ln -sfn $APP_PATH/releases/$RELEASE $APP_PATH/current

            # Start or reload PM2 app
            # CWD is explicitly set to ensure relative paths in ecosystem.config.js resolve correctly
            pm2 startOrReload $APP_PATH/current/ecosystem.config.js --env production --cwd $APP_PATH/current
            pm2 save

            # Keep only last 5 releases
            cd $APP_PATH/releases
            ls -1tr | head -n -5 | xargs -d '\n' rm -rf --
